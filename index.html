<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Snake AI Pro - Episode Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');
        body { background: #0f172a; color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        #homeScreen { position: fixed; top:0; left:0; width: 100%; height: 100vh; background: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.5s; }
        #mainDashboard { display: none; opacity: 0; transition: opacity 0.5s; width: 100%; flex-direction: column; align-items: center; padding-bottom: 30px; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        
        canvas { border-radius: 15px; border: 4px solid #4ade80; background: #000; box-shadow: 0 0 30px rgba(74, 222, 128, 0.2); image-rendering: pixelated; }
        
        /* 💡 점수판 스타일 업그레이드 */
        .hud { font-size: 20px; color: #4ade80; margin-bottom: 10px; font-weight: 600; text-align: center; text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); letter-spacing: 1px; }
        .hud span { color: #fff; margin: 0 10px; }
        
        label { font-size: 13px; color: #94a3b8; font-weight: bold; display: block; margin-top: 10px; }
        input[type="number"] { background: #1e293b; border: 1px solid #334155; color: white; padding: 8px; border-radius: 5px; width: 100%; box-sizing: border-box; font-family: 'Poppins', sans-serif; margin-top: 3px; }
        
        button { background: linear-gradient(45deg, #22c55e, #16a34a); border: none; color: white; padding: 12px 24px; border-radius: 50px; cursor: pointer; transition: 0.3s; margin: 5px; font-weight: bold; }
        button:hover { transform: scale(1.05); box-shadow: 0 0 15px #22c55e; }
        
        .toggle-btn { background: #334155; border-radius: 10px; padding: 10px 20px; font-size: 15px; margin-bottom: 20px; border: 1px solid #475569; }
        .toggle-btn:hover { background: #475569; }
    </style>
</head>
<body>

    <div id="homeScreen">
        <h1 style="color: #4ade80; font-size: 50px;">SNAKE AI PROTOCOL</h1>
        <button onclick="enterDashboard('start')">▶ 게임 시작</button>
        <button onclick="enterDashboard('setting')" style="background: #475569;">⚙️ 설정 및 조작</button>
    </div>

    <div id="mainDashboard">
        <h2 style="color: #4ade80; margin-top: 20px;">AI DASHBOARD</h2>
        
        <button id="toggleSettingsBtn" class="toggle-btn" onclick="toggleSettings()">⚙️ 설정창 숨기기</button>

        <div style="display: flex; gap: 30px; justify-content: center; align-items: flex-start; flex-wrap: wrap;">
            
            <div id="settingsPanel" class="glass-panel" style="width: 280px; text-align: left;">
                <h3 style="margin-top: 0; color: #86efac; border-bottom: 1px solid #334155; padding-bottom: 10px;">Hyperparameters</h3>
                
                <label>게임 속도 (SPEED)</label>
                <input type="number" id="speed" value="40">
                <label>학습률 (LEARNING RATE)</label>
                <input type="number" id="lr" value="0.001" step="0.0001">
                <label>미래 할인율 (GAMMA)</label>
                <input type="number" id="gamma" value="0.9" step="0.1">
                <label>탐험율 (EPSILON)</label>
                <input type="number" id="epsilon" value="80">
                <label>복습량 (BATCH SIZE)</label>
                <input type="number" id="batch" value="1000">
                <label>목표 점수 (TARGET SCORE)</label>
                <input type="number" id="target" value="10">
                
                <div style="margin: 15px 0; background: #1e293b; padding: 10px; border-radius: 8px;">
                    <input type="checkbox" id="load_model" style="width: auto; transform: scale(1.2); margin-right: 10px;">
                    <label for="load_model" style="display: inline; color: #fff; cursor: pointer;">기존 모델 불러오기</label>
                </div>
                
                <button onclick="applySettings()" style="width: 100%;">💾 변경사항 저장 & AI 재부팅</button>
            </div>

            <div class="glass-panel">
                <!-- 💡 점수판(HUD)에 EPISODE가 들어갈 자리 -->
                <div class="hud" id="scoreBoard">LOADING...</div>
                <canvas id="gameCanvas" width="640" height="480"></canvas>
                <div style="margin-top: 15px; text-align: center;">
                    <button onclick="sendCommand('start')">▶ START</button>
                    <button onclick="sendCommand('stop')" style="background: #ef4444;">⏸ STOP</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        let currentConfig = {};

        function defPixelImage(width, height, pixelData) {
            const temp = document.createElement('canvas');
            temp.width = width; temp.height = height;
            const tCtx = temp.getContext('2d');
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    if (pixelData[y][x]) {
                        tCtx.fillStyle = pixelData[y][x];
                        tCtx.fillRect(x, y, 1, 1);
                    }
                }
            }
            const img = new Image();
            img.src = temp.toDataURL();
            return img;
        }

        const _ = null;
        let appleImg, headImg, bodyImg, bgImg;

        // 🍎 1. 사과
        {
            const R = "#ef4444", D = "#b91c1c", G = "#22c55e", B = "#78350f", W = "#ffffff";
            const pixels = [
                [_,_,_,_,_,_,_,_,_,G,G,_,_,_,_,_,_,_,_,_],
                [_,_,_,_,_,_,_,_,_,_,G,G,_,_,_,_,_,_,_,_],
                [_,_,_,_,_,_,_,_,_,_,B,_,_,_,_,_,_,_,_,_],
                [_,_,_,_,_,_,_,_,_,B,_,_,_,_,_,_,_,_,_,_],
                [_,_,_,_,_,R,R,R,R,_,R,R,R,R,_,_,_,_,_,_],
                [_,_,_,R,R,R,W,W,R,R,R,R,R,R,R,R,_,_,_,_],
                [_,_,R,R,R,W,W,R,R,R,R,R,R,R,R,R,R,_,_,_],
                [_,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,_,_],
                [_,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,_,_],
                [R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,_],
                [R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,_],
                [R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,_],
                [R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,_],
                [_,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,R,_,_],
                [_,R,R,D,D,R,R,R,R,R,R,R,R,R,D,D,R,R,_,_],
                [_,_,R,D,D,D,D,R,R,R,R,R,D,D,D,D,R,_,_,_],
                [_,_,_,D,D,D,D,D,D,R,D,D,D,D,D,D,_,_,_,_],
                [_,_,_,_,D,D,D,D,_,_,_,D,D,D,D,_,_,_,_,_],
                [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
                [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_]
            ];
            appleImg = defPixelImage(20, 20, pixels);
        }

        // 🐍 2. 보라 뱀 머리
        {
            const O = "#4c1d95", G = "#a855f7", L = "#d8b4fe", W = "#ffffff", B = "#1e293b", P = "#f472b6", R = "#ef4444";
            const pixels = [
                [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
                [_,_,_,_,_,_,O,O,O,O,O,O,O,O,_,_,_,_,_,_],
                [_,_,_,_,_,O,L,L,L,G,G,G,G,G,O,_,_,_,_,_],
                [_,_,_,_,O,L,L,G,G,G,G,G,G,G,G,O,_,_,_,_],
                [_,_,_,O,L,G,G,G,G,G,G,G,G,G,G,G,O,_,_,_],
                [_,_,O,L,G,G,O,O,O,G,G,O,O,O,G,G,G,O,_,_],
                [_,_,O,G,G,O,W,W,B,O,O,W,W,B,O,G,G,O,_,_],
                [_,_,O,G,G,O,W,W,B,O,O,W,W,B,O,G,G,O,_,_],
                [_,_,O,G,G,O,W,B,B,O,O,W,B,B,O,G,G,O,_,_],
                [_,_,O,G,G,G,O,O,O,G,G,O,O,O,G,G,G,O,_,_],
                [_,_,O,G,P,P,G,G,G,G,G,G,G,P,P,G,G,O,_,_],
                [_,_,_,O,G,G,G,G,G,G,G,G,G,G,G,G,O,_,_,_],
                [_,_,_,_,O,O,G,G,G,G,G,G,G,G,O,O,_,_,_,_],
                [_,_,_,_,_,_,O,O,O,O,O,O,O,O,_,_,_,_,_,_],
                [_,_,_,_,_,_,_,_,_,R,R,_,_,_,_,_,_,_,_,_],
                [_,_,_,_,_,_,_,_,_,R,R,_,_,_,_,_,_,_,_,_],
                [_,_,_,_,_,_,_,_,R,_,_,R,_,_,_,_,_,_,_,_],
                [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
                [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
                [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_]
            ];
            headImg = defPixelImage(20, 20, pixels);
        }

        // 🟪 3. 보라 뱀 몸통
        {
            const O = "#4c1d95", G = "#a855f7", L = "#d8b4fe";
            const pixels = [
                [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
                [_,O,O,O,O,O,O,O,O,O,O,O,O,O,O,O,O,O,O,_],
                [_,O,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,G,L,L,L,L,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,G,L,G,G,G,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,G,O,_],
                [_,O,O,O,O,O,O,O,O,O,O,O,O,O,O,O,O,O,O,_],
                [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_]
            ];
            bodyImg = defPixelImage(20, 20, pixels);
        }

        // 🌳 4. 잔디 배경
        function createGrassPattern() {
            const temp = document.createElement('canvas');
            temp.width = 40; temp.height = 40;
            const tCtx = temp.getContext('2d');
            
            tCtx.fillStyle = "#a3e635"; 
            tCtx.fillRect(0,0,40,40);
            
            tCtx.fillStyle = "#84cc16"; 
            tCtx.fillRect(0, 0, 20, 20);
            tCtx.fillRect(20, 20, 20, 20);

            tCtx.fillStyle = "#65a30d"; 
            tCtx.fillRect(4, 4, 4, 4);
            tCtx.fillRect(8, 8, 4, 4);
            tCtx.fillRect(24, 8, 4, 4);
            tCtx.fillRect(28, 4, 4, 4);
            tCtx.fillRect(8, 28, 4, 4);
            tCtx.fillRect(12, 24, 4, 4);
            tCtx.fillRect(28, 28, 4, 4);
            tCtx.fillRect(32, 32, 4, 4);

            return temp.toDataURL();
        }
        bgImg = new Image(); bgImg.src = createGrassPattern();

        // 💡 5. UI 기능
        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            const btn = document.getElementById('toggleSettingsBtn');
            if (panel.style.display === 'none') {
                panel.style.display = 'block'; btn.innerText = '⚙️ 설정창 숨기기';
            } else {
                panel.style.display = 'none'; btn.innerText = '⚙️ 설정창 열기';
            }
        }

        function enterDashboard(mode) {
            document.getElementById('homeScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('homeScreen').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'flex';
                setTimeout(() => document.getElementById('mainDashboard').style.opacity = '1', 50);
                if(mode === 'start') sendCommand('start');
            }, 500);
        }

        function applySettings() {
            const settings = {
                SPEED: parseInt(document.getElementById('speed').value),
                LR: parseFloat(document.getElementById('lr').value),
                GAMMA: parseFloat(document.getElementById('gamma').value),
                EPSILON: parseInt(document.getElementById('epsilon').value),
                BATCH_SIZE: parseInt(document.getElementById('batch').value),
                TARGET_SCORE: parseInt(document.getElementById('target').value),
                LOAD_MODEL: document.getElementById('load_model').checked,
                N_GAMES: document.getElementById('load_model').checked ? (currentConfig.N_GAMES || 0) : 0,
                RECORD: document.getElementById('load_model').checked ? (currentConfig.RECORD || 0) : 0
            };
            ws.send(JSON.stringify({ command: "update_settings", settings: settings }));
            alert("✅ 설정이 저장되고 인공지능이 재부팅됩니다!");
        }

        function sendCommand(cmd) { ws.send(JSON.stringify({ command: cmd })); }

        // 💡 6. 실시간 렌더링
        ws.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                
                if(data.config && !currentConfig.SPEED) {
                    currentConfig = data.config;
                    document.getElementById('speed').value = data.config.SPEED || 40;
                    document.getElementById('lr').value = data.config.LR || 0.001;
                    document.getElementById('gamma').value = data.config.GAMMA || 0.9;
                    document.getElementById('epsilon').value = data.config.EPSILON || 80;
                    document.getElementById('batch').value = data.config.BATCH_SIZE || 1000;
                    document.getElementById('target').value = data.config.TARGET_SCORE || 10;
                    document.getElementById('load_model').checked = data.config.LOAD_MODEL || false;
                }

                if (!data.snake) return;

                // 💡 [핵심] 여기서 data.n_games를 띄워줍니다!
                document.getElementById("scoreBoard").innerHTML = 
                    `EPISODE: ${data.n_games} <span>|</span> SCORE: ${data.score} <span>|</span> RECORD: ${data.record}`;
                
                if (bgImg.complete) {
                    const pattern = ctx.createPattern(bgImg, 'repeat');
                    ctx.fillStyle = pattern; ctx.fillRect(0, 0, 640, 480);
                }
                
                if (appleImg.complete) {
                    ctx.drawImage(appleImg, data.food.x, data.food.y, 20, 20);
                }
                
                data.snake.forEach((pt, i) => {
                    if (i === 0 && headImg.complete) {
                        ctx.drawImage(headImg, pt.x, pt.y, 20, 20);
                    } else if (i > 0 && bodyImg.complete) {
                        ctx.drawImage(bodyImg, pt.x, pt.y, 20, 20);
                    }
                });
            } catch (err) {}
        };
    </script>
</body>
</html>
